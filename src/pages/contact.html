<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/styles/main.css">
    <title>Contact</title>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
</head>
<body>
    <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-none">
          <button class="btn btn-square btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block h-5 w-5 stroke-current"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path> </svg>
          </button>
        </div>
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">daisyUI</a>
        </div>
        <div class="flex-none">
          <button class="btn btn-square btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block h-5 w-5 stroke-current"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path> </svg>
          </button>
        </div>
      </div>
   <hr class="">
   <br>
      <h1 class="text-center text-4xl">☎️ Contact</h1>
      <br>
<hr>
<br>
<br>

<div class="flex">
<img src="/src/assets/phone.jpeg" width="300" alt="phone" class="ml-4"> 
<form action="">
    <div class="m-20 mt-30 card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
    <div class="color-base-100 rounded-xl card-body">
      <fieldset>  
        <p class="text-2xl font-serif">Our Contact:</p>
        <br>
        <p><iconify-icon icon="line-md:phone-twotone" width="18" height="18"></iconify-icon>Phone: +1 123-456-7890</p>
        <br>
        <br>
        <p><iconify-icon icon="line-md:email-alt-twotone" width="18" height="18"></iconify-icon>Email: innerlight@cyberchase.cc</p>
        <br>
        <br>
        <p><iconify-icon icon="line-md:github-twotone" width="18" height="18"></iconify-icon>Github: github.com/Brooklyn-STEAM/innerlight</p>
        <br>
      </fieldset>
    </form>
    <form action="">
        <div class="m-20 ml-20 card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
        <div class="card-body">
          <p class="text-2xl font-serif">Your Contact:</p>
            <fieldset>
            <iconify-icon icon="mdi:rename" width="14" height="14"></iconify-icon><label class="label">Name</label>
            <input type="text" class="input" placeholder="insert name here" />
            <br>
            <br>
            <iconify-icon icon="fe:phone" width="14" height="14"></iconify-icon><label class="label">Phone</label>
            <input type="tel" class="input validator tabular-nums" required placeholder="insert number here" 
      pattern="[0-9]*" minlength="10" maxlength="10" title="Must be 10 digits" />
    <p class="validator-hint">Must be 10 digits</p>
    <iconify-icon icon="ic:baseline-email" width="14" height="14"></iconify-icon><label class="label">Email</label>
            <input class="input validator" type="email" required placeholder="mail@site.com" />
            <div class="validator-hint">Enter valid email address</div>
            <button type="submit" class="btn btn-neutral mt-4">Submit</button>
            <button type="reset" class="btn btn-neutral mt-4">Reset</button>
          </fieldset>
        </form>
</div>
  </div>
</div>

</body>
</html>
